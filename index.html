<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gen 1 Vintage Binder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eee;color:#222;min-height:100vh}

/* TOP BAR */
.bar{background:#fff;border-bottom:1px solid #d5d5d5;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.bar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
h1{font-size:16px;font-weight:700;white-space:nowrap}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-text{font-size:13px;color:#555}
.prog-text b{color:#111}
.prog-track{width:100px;height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#3b82f6;border-radius:3px;transition:width .3s}
.bar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
input[type=search]{padding:6px 11px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:170px;outline:none}
input[type=search]:focus{border-color:#3b82f6}
.price-filter{display:flex;align-items:center;gap:5px;font-size:12px;color:#555}
.price-filter input{padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:80px;outline:none}
.price-filter input:focus{border-color:#3b82f6}
.filters{display:flex;border:1px solid #ddd;border-radius:6px;overflow:hidden}
.fb{padding:6px 12px;font-size:12px;border:none;background:#fff;cursor:pointer;border-right:1px solid #ddd;color:#555;transition:background .15s}
.fb:last-child{border-right:none}
.fb.on{background:#3b82f6;color:#fff}
.fb:not(.on):hover{background:#f5f5f5}

/* GRID */
.binder{max-width:1240px;margin:20px auto;padding:0 14px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}

/* CARD */
.card{background:#fff;border-radius:10px;overflow:hidden;border:2px solid #e0e0e0;cursor:pointer;transition:box-shadow .15s,transform .15s,border-color .15s;position:relative}
.card:hover{box-shadow:0 6px 20px rgba(0,0,0,.13);transform:translateY(-2px);border-color:#aaa}
.card.got{border-color:#22c55e}

/* greyscale for collected */
.card.got .img-wrap{filter:grayscale(1) opacity(.55)}

.img-wrap{width:100%;aspect-ratio:63/88;background:#f0f0f0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.img-wrap img{width:100%;height:100%;object-fit:cover;display:block}

/* placeholder when no image */
.img-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#ccc;font-size:10px;text-align:center;padding:8px;width:100%;height:100%}
.img-placeholder svg{opacity:.4}

.tick{position:absolute;top:6px;right:6px;background:#22c55e;color:#fff;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.2)}

.info{padding:6px 8px 5px}
.dex{font-size:9px;color:#aaa;margin-bottom:1px}
.pname{font-size:12px;font-weight:600;margin-bottom:2px;display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}
.pname-price{font-size:10px;font-weight:400;color:#9ca3af}
.pset{font-size:10px;color:#888;line-height:1.3}
.pnote{font-size:10px;color:#d97706;margin-top:2px;font-style:italic}

.foot{padding:4px 8px;display:flex;align-items:center;justify-content:space-between;background:#fafafa;border-top:1px solid #f0f0f0}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.pill.got{background:#dcfce7;color:#16a34a}
.pill.need{background:#f3f4f6;color:#9ca3af}
.tbtn{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;color:#555;transition:all .15s}
.tbtn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:400px;max-height:95vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{padding:10px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.mh h2{font-size:14px;font-weight:700}
.mx{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1}
.mx:hover{color:#333}
.mb{padding:10px 14px}
.mtop{display:flex;gap:10px;margin-bottom:10px}
.mimg{width:88px;flex-shrink:0;aspect-ratio:63/88;background:#f5f5f5;border-radius:6px;overflow:hidden;border:1px solid #e5e5e5}
.mimg img{width:100%;height:100%;object-fit:cover}
.mstat{flex:1}
.mlbl{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.strow{display:flex;gap:7px}
.st{flex:1;padding:9px 6px;text-align:center;border:2px solid #e5e5e5;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;color:#aaa}
.st:hover{border-color:#bbb;color:#555}
.st.got.on{border-color:#22c55e;background:#dcfce7;color:#16a34a}
.st.need.on{border-color:#e5e5e5;background:#f9fafb;color:#6b7280}
.fg{margin-bottom:7px}
.fl{display:block;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fi{width:100%;padding:5px 8px;border:1px solid #e5e5e5;border-radius:6px;font-size:13px;color:#111;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:#3b82f6}
.mf{padding:8px 14px;border-top:1px solid #f0f0f0;display:flex;gap:7px}
.bcancel{padding:8px 14px;border-radius:7px;border:1px solid #e0e0e0;background:#fff;font-size:13px;cursor:pointer;color:#555}
.bsave{flex:1;padding:8px;border-radius:7px;border:none;background:#3b82f6;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.bsave:hover{background:#2563eb}

.toast{position:fixed;bottom:18px;right:18px;background:#22c55e;color:#fff;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;animation:fu 2.1s ease forwards;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.toast.err{background:#ef4444}
.upload-btn{width:100%;padding:8px;border:2px dashed #ddd;border-radius:7px;background:#fafafa;color:#666;font-size:12px;cursor:pointer;text-align:center;transition:all .15s;margin-top:4px}
.upload-btn:hover{border-color:#3b82f6;color:#3b82f6;background:#eff6ff}
.uploading{opacity:.6;pointer-events:none}
.mimg-wrap{position:relative}
.mimg-replace{position:absolute;bottom:4px;left:0;right:0;text-align:center}
.mimg-replace label{font-size:10px;background:rgba(0,0,0,.55);color:#fff;padding:3px 8px;border-radius:4px;cursor:pointer;white-space:nowrap}
.mimg-replace label:hover{background:rgba(0,0,0,.75)}
@keyframes fu{0%{opacity:0;transform:translateY(5px)}10%{opacity:1;transform:translateY(0)}75%{opacity:1}100%{opacity:0}}
.empty{grid-column:1/-1;text-align:center;padding:60px;color:#bbb;font-size:14px}
/* value bar */
.val-bar{background:#f8f8f8;border-bottom:1px solid #e8e8e8;padding:6px 20px;display:flex;align-items:center;gap:20px;font-size:12px;color:#666;flex-wrap:wrap}
.val-item{display:flex;align-items:center;gap:5px}
.val-item b{color:#111;font-size:13px}
.val-item.profit b{color:#16a34a}
.val-item.loss b{color:#ef4444}
.val-divider{width:1px;height:14px;background:#ddd}
/* price fields side by side */
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}


/* AUTH */
.auth-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.auth-box{background:#fff;border-radius:12px;padding:28px 24px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
.auth-box h2{font-size:15px;font-weight:700;margin-bottom:6px}
.auth-box p{font-size:12px;color:#888;margin-bottom:18px}
.auth-box input{width:100%;padding:9px 12px;border:1px solid #e0e0e0;border-radius:7px;font-size:14px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:2px}
.auth-box input:focus{border-color:#3b82f6}
.auth-box button{width:100%;padding:9px;border:none;border-radius:7px;background:#3b82f6;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.auth-close{position:absolute!important;top:10px!important;right:12px!important;width:auto!important;background:none!important;padding:0!important;font-size:22px!important;color:#aaa!important;line-height:1!important;border-radius:0!important}
.auth-box button:hover{background:#2563eb}
.auth-box .auth-err{font-size:12px;color:#ef4444;margin-top:8px;min-height:16px}
.auth-badge{font-size:11px;color:#22c55e;cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid #dcfce7;background:#f0fdf4}
.auth-badge:hover{background:#dcfce7}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-left">
    <h1>Gen 1 Vintage Binder</h1>
    <div class="prog-wrap">
      <span class="prog-text"><b id="gc">0</b> / 151</span>
      <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
    </div>
  </div>
  <div class="bar-right">
    <input type="search" id="srch" placeholder="Search…" oninput="draw()">
    <div class="price-filter"><span>Up to £</span><input type="number" id="pmax" min="0" step="1" placeholder="any" oninput="draw()"></div>
    <button class="auth-badge" id="auth-btn" onclick="handleAuthBtn()" >🔒 Locked</button>
    <div class="filters">
      <button class="fb on" data-f="all" onclick="setF('all')">All</button>
      <button class="fb" data-f="got" onclick="setF('got')">Got</button>
      <button class="fb" data-f="need" onclick="setF('need')">Need</button>
    </div>
  </div>
</div>
<div class="val-bar" id="val-bar">
  <div class="val-item"><span>Collection value:</span><b id="v-value">£0.00</b></div>
  <div class="val-divider"></div>
  <div class="val-item"><span>Total spent:</span><b id="v-spent">£0.00</b></div>
  <div class="val-divider"></div>
  <div class="val-item" id="v-diff-wrap"><span>Difference:</span><b id="v-diff">£0.00</b></div>
</div>
  </div>
</div>
<div class="binder"><div class="grid" id="grid"></div></div>
<div id="mr"></div>
<div id="auth-modal"></div>

function sbFetch(path,opts={}){
  const token=sessionStorage.getItem('sb_token')||SUPA_KEY;
  return fetch(SUPA_URL+path,{...opts,headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json',...(opts.headers||{})}});
}

async function load(){
  cards=JSON.parse(JSON.stringify(SEED));
  try{
    const r=await sbFetch('/rest/v1/collection?select=*&order=no.asc');
    const rows=await r.json();
    if(rows&&rows.length){
      rows.forEach(row=>{
        const c=cards.find(x=>x.no===row.no);
        if(c){c.got=row.got;c.note=row.note||'';c.set=row.set||c.set;c.cardNo=row.cardNo||c.cardNo;c.link=row.link||c.link;c.customImg=row.customImg||null;c.price=row.price||'';c.paid=row.paid||'';}
      });
    } else {
      await sbFetch('/rest/v1/collection',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(SEED.map(c=>({no:c.no,got:c.got,note:c.note,set:c.set,cardNo:c.cardNo,link:c.link,customImg:null,price:null,paid:null})))});
    }
  }catch(e){console.error(e);}
  draw();
}

async function save(){
  try{
    const rows=cards.map(c=>({no:c.no,got:c.got,note:c.note,set:c.set,cardNo:c.cardNo,link:c.link,customImg:c.customImg||null,price:c.price||null,paid:c.paid||null}));
    await sbFetch('/rest/v1/collection',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(rows)});
    toast();
  }catch(e){console.error(e);}
}

function toast(msg,type){
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=type?'✗ '+msg:'✓ '+(msg||'Saved');
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}

// SVG placeholder shown when a card has no image yet
function imgPlaceholder(name){
  return `<div class="img-placeholder">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <span>No image</span>
  </div>`;
}

function draw(){
  const q=document.getElementById('srch').value.toLowerCase();

  const got=cards.filter(c=>c.got).length;
  document.getElementById('gc').textContent=got;
  document.getElementById('pf').style.width=(got/151*100)+'%';

  const parsePrice=v=>parseFloat((v||'').replace(/[^0-9.]/g,''))||0;
  let totalVal=0,totalSpent=0;
  cards.filter(c=>c.got).forEach(c=>{totalVal+=parsePrice(c.price);totalSpent+=parsePrice(c.paid);});
  const fmt=n=>'£'+n.toFixed(2);
  document.getElementById('v-value').textContent=fmt(totalVal);
  document.getElementById('v-spent').textContent=fmt(totalSpent);
  const diff=totalVal-totalSpent;
  const diffEl=document.getElementById('v-diff');
  const diffWrap=document.getElementById('v-diff-wrap');
  diffEl.textContent=(diff>=0?'+':'')+fmt(diff);
  diffWrap.className='val-item '+(diff>0?'profit':diff<0?'loss':'');

  const pmaxVal=document.getElementById('pmax').value;
  const pmax=pmaxVal!==''?parseFloat(pmaxVal):null;

  const vis=cards.filter(c=>{
    if(flt==='got'&&!c.got)return false;
    if(flt==='need'&&c.got)return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.set.toLowerCase().includes(q))return false;
    if(pmax!==null){const p=parsePrice(c.price);if(p>0&&p>pmax)return false;}
    return true;
  });

  const grid=document.getElementById('grid');
  if(!vis.length){grid.innerHTML='<div class="empty">No cards match</div>';return;}

  grid.innerHTML=vis.map(c=>{
    const sc=c.got?'got':'need';
    const imgContent=c.customImg
      ? `<img src="${c.customImg}" alt="${c.name}" loading="lazy">`
      : imgPlaceholder(c.name);
    return `<div class="card ${sc}" onclick="openEdit(${c.no})">
      ${c.got?'<div class="tick">✓</div>':''}
      <div class="img-wrap">${imgContent}</div>
      <div class="info">
        <div class="dex">#${String(c.no).padStart(3,'0')}</div>
        <div class="pname">${c.name}${c.price?`<span class="pname-price">£${parseFloat((c.price||'').replace(/[^0-9.]/g,'')).toFixed(2)}</span>`:''}</div>
        <div class="pset">${c.set}${c.cardNo?' · '+c.cardNo:''}</div>
        ${c.note?`<div class="pnote">${c.note}</div>`:''}
      </div>
      <div class="foot">
        <span class="pill ${sc}">${c.got?'Got':'Need'}</span>
        <button class="tbtn" onclick="tog(event,${c.no})">${c.got?'Unmark':'Mark got'}</button>
      </div>
    </div>`;
  }).join('');
}

function tog(e,no){
  e.stopPropagation();
  if(!authed){showAuthModal(()=>{const c=cards.find(x=>x.no===no);if(c){c.got=!c.got;save();draw();}});return;}
  const c=cards.find(x=>x.no===no);
  if(c){c.got=!c.got;save();draw();}
}

          <div class="fg"><label class="fl">Card Number</label><input class="fi" id="fn" value="${c.cardNo||''}" ${authed?'oninput="ed.cardNo=this.value"':'readonly'}></div>

          }
        </div>
      </div>
    </div>`;
}

async function uploadImg(input){
  const file=input.files[0];
  if(!file)return;
  if(!authed){showAuthModal(()=>{});toast('Please unlock editing first','err');return;}
  const box=document.getElementById('mimg-box');
  box.style.opacity='0.5';
  const ext=file.name.split('.').pop();
  const path=`card-${ed.no}-${Date.now()}.${ext}`;
  try{
    const res=await fetch(`${SUPA_URL}/storage/v1/object/card-images/${path}`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':file.type,'Cache-Control':'3600'},
      body:file
    });
    if(!res.ok)throw new Error('Upload failed');
    const publicUrl=`${SUPA_URL}/storage/v1/object/public/card-images/${path}`;
    ed.customImg=publicUrl;
    box.innerHTML=`<img id="mcard-img" src="${publicUrl}" alt="${ed.name}" style="width:100%;height:100%;object-fit:cover">`;
    box.style.opacity='1';
    // Update label to say Replace now that there's an image
    const lbl=document.querySelector('.mimg-replace label');
    if(lbl)lbl.childNodes[0].textContent='📷 Replace';
    toast('Image uploaded');
  }catch(e){
    console.error(e);
    box.style.opacity='1';
    toast('Upload failed','err');
  }
}

function setGot(v){
  ed.got=v;
  document.querySelector('.st.got').classList.toggle('on',v);
  document.querySelector('.st.need').classList.toggle('on',!v);
}
function closeModal(){document.getElementById('mr').innerHTML='';ed=null;}
function saveEdit(){
  if(!authed){showAuthModal(()=>saveEdit());return;}
  const i=cards.findIndex(c=>c.no===ed.no);
  if(i!==-1)cards[i]=ed;
  save();closeModal();draw();
}

/* ---- AUTH ---- */
const ADMIN_EMAIL='Eseyermiyas4@googlemail.com';
let authed=false;

async function initAuth(){
  // Check for existing session
  try{
    const r=await fetch(SUPA_URL+'/auth/v1/user',{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+(sessionStorage.getItem('sb_token')||'')}
    });
    if(r.ok){const u=await r.json();if(u.id){setAuthed(true);return;}}
  }catch(e){}
  setAuthed(false);
}

async function signIn(password){
  const r=await fetch(SUPA_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:ADMIN_EMAIL,password})
  });
  const data=await r.json();
  if(data.access_token){
    sessionStorage.setItem('sb_token',data.access_token);
    setAuthed(true);
    document.getElementById('auth-modal').innerHTML='';
    toast('Editing unlocked');
    return true;
  }
  return false;
}

function signOut(){
  sessionStorage.removeItem('sb_token');
  setAuthed(false);
  toast('Signed out');
}

function setAuthed(v){
  authed=v;
  const btn=document.getElementById('auth-btn');
  if(!btn)return;
  if(v){
    // Replace input with editing badge
    btn.outerHTML='<button class="auth-badge" id="auth-btn" onclick="handleAuthBtn()">🔓 Editing</button>';
  }else{
    // Replace badge with password input
    btn.outerHTML='<input type="password" id="auth-btn" placeholder="Password" onkeydown="if(event.key===\'Enter\')quickLogin(this.value)" style="padding:6px 11px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:110px;outline:none">';
  }
}

function handleAuthBtn(){
  if(authed){if(confirm('Stop editing?'))signOut();}
}

function showAuthModal(onSuccess){
  const modal=document.getElementById('auth-modal');
  modal.innerHTML=`
    <div class="auth-ov" id="auth-ov" onclick="if(event.target.id==='auth-ov')closeAuthModal()">
      <div class="auth-box" style="position:relative;padding-top:36px">
        <button class="auth-close" onclick="closeAuthModal()">×</button>
        <input type="password" id="auth-pw" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
        <div class="auth-err" id="auth-err"></div>
      </div>
    </div>`;
  document.getElementById('auth-pw').focus();
  window._authSuccess=onSuccess;
}

async function quickLogin(pw){
  if(!pw)return;
  const ok=await signIn(pw);
  if(!ok){
    const btn=document.getElementById('auth-btn');
    if(btn){btn.value='';btn.style.borderColor='#ef4444';setTimeout(()=>{btn.style.borderColor='#ddd';},1200);}
  }
}

function closeAuthModal(){
  document.getElementById('auth-modal').innerHTML='';
  window._authSuccess=null;
}

async function tryLogin(){
  const pw=document.getElementById('auth-pw').value;
  const errEl=document.getElementById('auth-err');
  errEl.textContent='Checking…';
  const ok=await signIn(pw);
  if(ok){
    if(window._authSuccess)window._authSuccess();
    window._authSuccess=null;
  } else {
    errEl.textContent='Incorrect password, try again.';
    document.getElementById('auth-pw').value='';
    document.getElementById('auth-pw').focus();
  }
}

initAuth();
let _qlTimer=null, _mlTimer=null;

function scheduleQuickLogin(input){
  clearTimeout(_qlTimer);
  _qlTimer=setTimeout(()=>{if(input.value)quickLogin(input.value);},300);
}

function scheduleModalLogin(input){
  clearTimeout(_mlTimer);
  _mlTimer=setTimeout(()=>{if(input.value)modalLogin(input);},300);
}

async function modalLogin(input){
  const pw=input.value;
  if(!pw)return;
  const ok=await signIn(pw);
  if(ok){
    // Reopen the modal now authed so it refreshes to edit mode
    const no=ed.no;
    closeModal();
    openEdit(no);
  } else {
    input.value='';
    input.style.borderColor='#ef4444';
    setTimeout(()=>{input.style.borderColor='#e0e0e0';},1200);
  }
}

document.addEventListener('keydown', function(e){
  if(e.key !== 'Escape') return;
  e.preventDefault();
  // Close auth modal if open
  if(document.getElementById('auth-modal') && document.getElementById('auth-ov')){
    closeAuthModal();
    return;
  }
  // Close card modal if open
  if(document.getElementById('mr') && document.getElementById('ov')){
    closeModal();
    return;
  }
});
